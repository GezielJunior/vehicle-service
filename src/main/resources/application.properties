#Wed Apr 29 00:06:27 UTC 2026
# ========================================
# Application
# ========================================
micronaut.application.name=vehicle-service

# ========================================
# Security (JWT + Bearer)
# ========================================
micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}

# ========================================
# Swagger / OpenAPI
# ========================================
micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**
micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/swagger/views/swagger-ui
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui/**

# ========================================
# Datasource (PostgreSQL)
# ========================================
datasources.default.url=${DB_URL:`jdbc:postgresql://192.168.1.135:5432/dbvehicle`}
datasources.default.username=${DB_USERNAME:postgres}
datasources.default.password=${DB_PASSWORD:987654321}
datasources.default.dialect=POSTGRES

# ========================================
# JPA / Hibernate
# ========================================
jpa.default.packages-to-scan[0]=br.com.carstore
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=true
jpa.default.properties.hibernate.format_sql=true
jpa.default.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
